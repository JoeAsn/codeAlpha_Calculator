<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>GlassCalc | Precision Reimagined</title>

    <link rel="stylesheet" href="./styles/styles.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <script defer src="scripts/script.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/14.5.2/math.js" defer></script>
  </head>

  <body>

    <!-- Main Content -->
    <main>
      <!-- Calculator Container -->
      <div class="glass-panel">

        <!-- Display Area -->
        <div class="display-area">
          <div class="expression" id="expression"></div>
          <div class="current-value" id="display">0</div>
        </div>

        <!-- Keypad Grid -->
        <div class="keypad">

          <!-- Row 1 -->
          <button class="glass-button text-error" data-action="clear">
            AC
          </button>

          <button class="glass-button text-primary" data-action="backspace">
            <span class="material-symbols-outlined">backspace</span>
          </button>

          <button class="glass-button operator-btn" data-value="%">%</button>

          <button class="glass-button text-secondary operator-glow operator-btn" data-value="/">
            ÷
          </button>

          <!-- Row 2 -->
          <button class="glass-button number-btn" data-value="7">7</button>
          <button class="glass-button number-btn" data-value="8">8</button>
          <button class="glass-button number-btn" data-value="9">9</button>

          <button class="glass-button text-secondary operator-glow operator-btn" data-value="*">
            ×
          </button>

          <!-- Row 3 -->
          <button class="glass-button number-btn" data-value="4">4</button>
          <button class="glass-button number-btn" data-value="5">5</button>
          <button class="glass-button number-btn" data-value="6">6</button>

          <button class="glass-button text-secondary operator-glow operator-btn" data-value="-">
            −
          </button>

          <!-- Row 4 -->
          <button class="glass-button number-btn" data-value="1">1</button>
          <button class="glass-button number-btn" data-value="2">2</button>
          <button class="glass-button number-btn" data-value="3">3</button>

          <button class="glass-button text-secondary operator-glow operator-btn" data-value="+">
            +
          </button>

          <!-- Row 5 -->
          <button class="glass-button span-2 number-btn" data-value="0">
            0
          </button>

          <button class="glass-button number-btn" data-value=".">.</button>

          <button class="glass-button equals-btn" data-action="equals">
            =
          </button>

        </div>
      </div>
    </main>

    <!-- BottomNavBar -->
    <footer>
      <button class="nav-item active">
        <span class="material-symbols-outlined">calculate</span>
        <span class="nav-label">Calculator</span>
      </button>

      <button class="nav-item">
        <span class="material-symbols-outlined">history</span>
        <span class="nav-label">History</span>
      </button>

      <button class="nav-item">
        <span class="material-symbols-outlined">settings</span>
        <span class="nav-label">Settings</span>
      </button>
    </footer>
  </body>
</html>
